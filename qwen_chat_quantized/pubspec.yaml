name: qwen_chat_quantized
description: Offline AI chatbot powered by Qwen3.5-0.8B (Quantized Q4_K_M for 8GB RAM)

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0
  flutter: '>=3.29.0'

dependencies:
  flutter:
    sdk: flutter
  llamadart: ^0.6.6
  path_provider: ^2.1.5
  image_picker: ^1.1.2
  http: ^1.3.0
  permission_handler: ^11.3.1
  flutter_markdown: ^0.7.7
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

hooks:
  user_defines:
    llamadart:
      llamadart_native_backends:
        platforms:
          android-arm64:
            backends: [vulkan]
            cpu_profile: full

flutter:
  uses-material-design: true
